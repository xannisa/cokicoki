version: "3.9"

networks:
  app-network:
    driver: bridge

services:
  nextjs-app:
    build: .
    container_name: nextjs-app
    ports:
      - "3000:3000"  # optional, can be removed if only accessed via Nginx
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      nextjs-app:
        condition: service_healthy
    networks:
      - app-network