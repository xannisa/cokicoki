version: "3.9"

networks:
  app-network:
    driver: overlay

services:
  next-app-js:
    image: next-app-js:latest
    networks:
      - app-network

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    deploy:
      replicas: 3
      restart_policy:
        condition: any
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - app-network

    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

    deploy:
      replicas: 1
      restart_policy:
        condition: any